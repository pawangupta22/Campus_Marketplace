<!DOCTYPE html>
<html>
<head>
    <title>Seller Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Seller Panel</h2>
        <ul>
            <li> Profile</li>
            <li> Products</li>
            <li> Add Product</li>
        </ul>
    </div>

    <!-- Main -->
    <div class="main">

        <!-- Navbar -->
        <div class="navbar">
            <h2>Dashboard</h2>
        </div>

        <!-- Content -->
        <div class="content">

            <!-- Profile Section -->
            <div class="section">
                <h3>My Profile</h3>
                <p><strong>Name:</strong> Anurag</p>
                <p><strong>Email:</strong> example@gmail.com</p>
            </div>

            <!-- Products Section -->
            <div class="section">
                <h3>My Products</h3>

                <div class="product-card">
                    <h4>Product Name</h4>
                    <p>₹999</p>
                    <p>Short description of product</p>
                </div>

                <div class="product-card">
                    <h4>Product Name</h4>
                    <p>₹499</p>
                    <p>Short description of product</p>
                </div>
            </div>

            <!-- Add Product Section -->
            <div class="section">
                <h3>Add Product</h3>

                <input type="text" placeholder="Product Name">
                <input type="number" placeholder="Price">
                <textarea placeholder="Description"></textarea>
                <button>Add Product</button>
            </div>

        </div>

    </div>

</div>

</body>
</html>
