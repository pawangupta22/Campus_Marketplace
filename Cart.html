<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campus MarketPlace - Cart</title>
 
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
 
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }
 
      body {
        background-color: #f7f9fc;
        color: #333;
        line-height: 1.5;
      }
 
      ul { list-style: none; }
      a { text-decoration: none; color: inherit; }
      img { max-width: 100%; height: auto; }
 
      button {
        background-color: #6c63ff;
        border-radius: 6px;
        padding: 0.6rem 1rem;
        border: none;
        cursor: pointer;
        color: white;
      }
 
      section { padding: 2rem 5%; }
 
      .header {
        display: flex;
        justify-content: space-between;
        background-color: white;
        align-items: center;
        padding: 1rem 2.25%;
        border: 1px solid #eee;
        flex-wrap: wrap;
        gap: 1rem;
      }
 
      .search-box {
        display: flex;
        align-items: center;
        background: #f5f7fa;
        padding: 0.5rem 1rem;
        border-radius: 30px;
        width: 280px;
        transition: 0.3s;
        border: 1px solid transparent;
      }
 
      .search-box i {
        color: #6c63ff;
        margin-right: 8px;
        font-size: 14px;
      }
 
      .search-box input {
        border: none;
        outline: none;
        background: transparent;
        width: 100%;
        font-size: 0.9rem;
      }
 
      .search-box:hover,
      .search-box:focus-within {
        background: white;
        border: 1px solid #6c63ff;
        box-shadow: 0 4px 12px rgba(108, 99, 255, 0.15);
      }
 
      .logo img { height: 3.25rem; }
 
      .Cart_icon {
        font-size: 2rem;
        display: flex;
        justify-content: space-around;
      }
 
      nav ul {
        display: flex;
        gap: 2.5rem;
        align-items: center;
      }
 
      nav ul a:hover { color: #6c63ff; }
 
      span h2 {
        display: flex;
        justify-content: center;
        align-items: center;
        padding-top: 1.5rem;
      }
 
      /* ── Cart Page Layout ── */
      .cart-page {
        padding: 1.5rem 5%;
        display: grid;
        grid-template-columns: 1fr 320px;
        gap: 2rem;
        align-items: start;
        max-width: 1200px;
        margin: 0 auto;
      }
 
      .cart-items {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
 
      .cart-card {
        background: white;
        border-radius: 12px;
        border: 1px solid #eee;
        padding: 1rem 1.25rem;
        display: flex;
        align-items: center;
        gap: 1rem;
        position: relative;
      }
 
      .cart-card img,
      .cart-card .item-img-placeholder {
        width: 85px;
        height: 85px;
        border-radius: 8px;
        object-fit: cover;
        flex-shrink: 0;
        background: #f5f7fa;
        border: 1px solid #eee;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #ccc;
        font-size: 13px;
      }
 
      .item-info { flex: 1; }
 
      .item-name {
        font-size: 15px;
        font-weight: 600;
        color: #222;
        margin-bottom: 3px;
      }
 
      .item-meta {
        font-size: 13px;
        color: #888;
        margin-bottom: 10px;
      }
 
      .qty-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
 
      .qty-btn {
        width: 28px;
        height: 28px;
        border-radius: 7px;
        background: #6c63ff;
        color: white;
        border: none;
        font-size: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        line-height: 1;
        padding: 0;
        font-weight: 300;
      }
 
      .qty-btn:hover { background: #5a52d5; }
 
      .qty-val {
        font-size: 14px;
        font-weight: 500;
        min-width: 18px;
        text-align: center;
        color: #333;
      }
 
      .item-price {
        font-size: 16px;
        font-weight: 700;
        color: #222;
        margin-left: auto;
        padding-left: 1rem;
      }
 
      .remove-btn {
        position: absolute;
        top: 10px;
        right: 14px;
        background: none;
        border: none;
        color: #bbb;
        font-size: 14px;
        cursor: pointer;
        padding: 2px 4px;
        border-radius: 4px;
      }
 
      .remove-btn:hover { color: #e74c3c; background: #fef2f2; }
 
      /* ── Order Summary ── */
      .summary-card {
        background: white;
        border-radius: 12px;
        border: 1px solid #eee;
        padding: 1.5rem;
        position: sticky;
        top: 1rem;
      }
 
      .summary-title {
        font-size: 20px;
        font-weight: 700;
        color: #222;
        margin-bottom: 1.25rem;
      }
 
      .summary-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 14px;
        color: #555;
        margin-bottom: 0.75rem;
      }
 
      .summary-row .val { color: #222; }
      .free-tag { color: #27ae60; font-weight: 500; }
 
      .summary-divider {
        border: none;
        border-top: 1px solid #eee;
        margin: 1rem 0;
      }
 
      .total-row {
        display: flex;
        justify-content: space-between;
        font-size: 17px;
        font-weight: 700;
        color: #222;
        margin-bottom: 1.25rem;
      }
 
      .checkout-btn {
        width: 100%;
        background: #111;
        color: white;
        border: none;
        padding: 14px;
        border-radius: 30px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        letter-spacing: 0.03em;
        transition: background 0.2s;
      }
 
      .checkout-btn:hover { background: #333; }
 
      /* ── Empty State ── */
      .empty-cart {
        text-align: center;
        padding: 4rem 2rem;
        color: #aaa;
      }
 
      .empty-cart i { font-size: 48px; margin-bottom: 1rem; color: #ddd; }
      .empty-cart p { font-size: 15px; }
 
      @media (max-width: 768px) {
        .cart-page { grid-template-columns: 1fr; }
        .summary-card { position: static; }
      }
    </style>
  </head>
  <body>
 
    <header class="header">
      <div class="logo">
        <a href="index.html">
          <img src="images/logo.png" alt="Campus Marketplace" />
        </a>
      </div>
      <nav>
        <ul>
          <li><a href="#">Home</a></li>
          <li><a href="#">Buy</a></li>
          <li><a href="#">Sell</a></li>
          <li><a href="#">Browse</a></li>
        </ul>
      </nav>
      <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" placeholder="Search books, electronics..." />
      </div>
      <button>Login</button>
      <div class="Cart_icon">
        <a href="Cart.html"><i class="fa-solid fa-cart-shopping" style="color: rgb(108, 99, 255)"></i></a>
      </div>
    </header>
 
    <span><h2>YOUR CART</h2></span>
 
    <div class="cart-page">
      <!-- Cart Items -->
      <div class="cart-items" id="cart-items"></div>
 
      <!-- Order Summary -->
      <div class="summary-card">
        <div class="summary-title">Order Summary</div>
        <div class="summary-row"><span>Sub Total</span><span class="val" id="subtotal">$0.00</span></div>
        <div class="summary-row"><span>Discount</span><span class="val" id="discount">$0.00</span></div>
        <div class="summary-row"><span>Shipping</span><span class="free-tag">Free</span></div>
        <hr class="summary-divider">
        <div class="total-row"><span>Total</span><span id="total">$0.00</span></div>
        <button class="checkout-btn">Proceed to Checkout</button>
      </div>
    </div>
 
    <script>
      // Cart data — replace src with real image paths
      let cart = [
        { id: 1, name: "Slim Fit Casual Shirt",    size: "XL", color: "Marron", price: 85,  qty: 1, src: "" },
        { id: 2, name: "Printed Straight Kurtas",  size: "XL", color: "Green",  price: 68,  qty: 2, src: "" },
        { id: 3, name: "Printed Straight Kurtas",  size: "XL", color: "Green",  price: 68,  qty: 2, src: "" },
        { id: 4, name: "Printed Straight Kurtas",  size: "XL", color: "Green",  price: 68,  qty: 2, src: "" },
      ];
 
      const DISCOUNT_RATE = 0.1485;
 
      function render() {
        const container = document.getElementById('cart-items');
 
        if (cart.length === 0) {
          container.innerHTML = `
            <div class="empty-cart">
              <i class="fa-solid fa-cart-shopping"></i>
              <p>Your cart is empty</p>
            </div>`;
          updateSummary(0);
          return;
        }
 
        container.innerHTML = cart.map(item => `
          <div class="cart-card">
            ${item.src
              ? `<img src="${item.src}" alt="${item.name}">`
              : `<div class="item-img-placeholder"></div>`}
            <div class="item-info">
              <div class="item-name">${item.name}</div>
              <div class="item-meta">Size ${item.size} | Color ${item.color}</div>
              <div class="qty-row">
                <button class="qty-btn" onclick="changeQty(${item.id}, -1)">−</button>
                <span class="qty-val">${item.qty}</span>
                <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
              </div>
            </div>
            <span class="item-price">$${(item.price * item.qty).toFixed(0)}</span>
            <button class="remove-btn" title="Remove" onclick="removeItem(${item.id})">✕</button>
          </div>
        `).join('');
 
        const sub = cart.reduce((s, i) => s + i.price * i.qty, 0);
        updateSummary(sub);
      }
 
      function updateSummary(sub) {
        const disc = +(sub * DISCOUNT_RATE).toFixed(2);
        document.getElementById('subtotal').textContent = '$' + sub.toFixed(2);
        document.getElementById('discount').textContent = '$' + disc.toFixed(2);
        document.getElementById('total').textContent    = '$' + (sub - disc).toFixed(2);
      }
 
      function changeQty(id, delta) {
        const item = cart.find(i => i.id === id);
        if (item) { item.qty = Math.max(1, item.qty + delta); render(); }
      }
 
      function removeItem(id) {
        cart = cart.filter(i => i.id !== id);
        render();
      }
 
      render();
    </script>
 
  </body>
</html>
